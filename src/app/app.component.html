<div class="navbar bg-base-100 shadow-sm flex justify-center">
  <ul class="menu menu-horizontal">
    @for (item of menu(); track item.title) {
      <li>
        <details class="w-56">
          <summary>{{ item.title }}</summary>
          <ul>
            @for (submenu of item.submenus; track submenu.title) {
              <li>
                <a [routerLink]="submenu.url">{{ submenu.title }}</a>
              </li>
            }
          </ul>
        </details>
      </li>
    }
  </ul>
</div>

<router-outlet></router-outlet>
